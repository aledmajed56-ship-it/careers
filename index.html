<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>م د للتوظيف | MD Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a252f; --accent-color: #b59410; --text-color: #333; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; background: #f8f9fa; color: var(--text-color); }
        .admin-panel { display: none; background: #fff; padding: 20px; border: 2px solid var(--accent-color); margin: 20px; }
        .job-card { background: white; padding: 20px; margin: 15px; border-radius: 10px; border-right: 5px solid var(--accent-color); }
        .save-btn { background: #27ae60; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <header style="background: #1a252f; color: white; padding: 40px; text-align: center;">
        <h1>م د للتوظيف</h1>
    </header>

    <div id="jobsContainer" style="max-width: 800px; margin: auto;">جاري تحميل الوظائف...</div>

    <div class="admin-panel" id="adminPanel">
        <h2>🎛️ لوحة التحكم السحابية</h2>
        <div id="adminJobsList"></div>
        <button class="save-btn" onclick="saveData()">💾 حفظ التحديثات في السحابة</button>
    </div>

    <button onclick="handleSecretClick()" style="position: fixed; top: 10px; left: 10px;">⚙️</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // === ضع بياناتك هنا من الصورة ===
        const firebaseConfig = {
            apiKey: "ضع_apiKey_هنا",
            authDomain: "ضع_authDomain_هنا",
            projectId: "ضع_projectId_هنا",
            storageBucket: "ضع_storageBucket_هنا",
            messagingSenderId: "ضع_messagingSenderId_هنا",
            appId: "ضع_appId_هنا"
        };
        // ==============================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "data", "jobsConfig");
        let jobsData = [];

        async function loadData() {
            try {
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    jobsData = docSnap.data().jobs || [];
                    renderJobs();
                }
            } catch (e) { console.error(e); }
        }

        function renderJobs() {
            const container = document.getElementById('jobsContainer');
            container.innerHTML = jobsData.map(job => `
                <div class="job-card">
                    <h2>${job.title}</h2>
                    <a href="${job.link}" target="_blank">التقديم الفوري</a>
                </div>
            `).join('');
        }

        window.saveData = async function() {
            try {
                await setDoc(docRef, { jobs: jobsData });
                alert("✅ تم الحفظ بنجاح!");
            } catch (e) { alert("❌ خطأ!"); }
        };

        window.handleSecretClick = function() {
            let pass = prompt("الرقم السري:");
            if (pass === "1425") {
                document.getElementById('adminPanel').style.display = 'block';
                const list = document.getElementById('adminJobsList');
                list.innerHTML = jobsData.map((job, index) => `
                    <div style="margin-bottom:10px;">
                        <input type="text" value="${job.title}" onchange="jobsData[${index}].title = this.value">
                        <input type="text" value="${job.link}" onchange="jobsData[${index}].link = this.value">
                    </div>
                `).join('');
            }
        };

        window.onload = loadData;
    </script>
</body>
</html>
