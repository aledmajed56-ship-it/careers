<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>م د للتوظيف | MD Recruitment</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a252f; --accent-color: #b59410; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #f8f9fa; }
        .job-card { background: white; padding: 20px; margin: 15px; border-radius: 10px; border-right: 5px solid var(--accent-color); }
        .admin-panel { display: none; background: #fff; padding: 20px; border: 2px solid var(--accent-color); margin: 20px; }
        .admin-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary-color); color: white; padding: 10px; cursor: pointer; border-radius: 5px; }
        .delete-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header style="background: #1a252f; color: white; padding: 40px; text-align: center;">
        <h1>م د للتوظيف</h1>
    </header>

    <div id="jobsContainer">جاري تحميل الوظائف...</div>

    <div id="adminPanel" class="admin-panel">
        <h3>🛠️ لوحة تحكم الإدارة</h3>
        <input type="text" id="jobTitle" placeholder="عنوان الوظيفة">
        <input type="text" id="jobLink" placeholder="رابط التقديم">
        <button onclick="addNewJob()">إضافة وظيفة</button>
        <hr>
        <div id="adminJobsList"></div>
    </div>

    <div class="admin-btn" onclick="handleSecretClick()">⚙️</div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, onSnapshot, query, orderBy, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. عرض الوظائف للزوار
        const jobsRef = collection(db, "jobs");
        const q = query(jobsRef, orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('jobsContainer');
            const adminList = document.getElementById('adminJobsList');
            container.innerHTML = '';
            adminList.innerHTML = '';

            snapshot.forEach((docSnapshot) => {
                const job = docSnapshot.data();
                
                // إضافة للزوار
                container.innerHTML += `
                    <div class="job-card">
                        <h2>${job.title}</h2>
                        <a href="${job.link}" target="_blank">التقديم الفوري</a>
                    </div>`;

                // إضافة للوحة التحكم
                adminList.innerHTML += `
                    <div style="margin:10px; border-bottom:1px solid #ccc;">
                        <span>${job.title}</span>
                        <button class="delete-btn" onclick="deleteJob('${docSnapshot.id}')">حذف</button>
                    </div>`;
            });
        });

        // 2. دوال الإدارة
        window.addNewJob = async () => {
            const title = document.getElementById('jobTitle').value;
            const link = document.getElementById('jobLink').value;
            await addDoc(jobsRef, { title, link, timestamp: serverTimestamp() });
            alert("تمت الإضافة!");
        };

        window.deleteJob = async (id) => {
            await deleteDoc(doc(db, "jobs", id));
        };

        window.handleSecretClick = () => {
            const pass = prompt("كلمة المرور:");
            if (pass === "1425") document.getElementById('adminPanel').style.display = 'block';
        };
    </script>
</body>
</html>
