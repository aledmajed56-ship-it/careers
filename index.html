<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>م د للتوظيف | MD Recruitment</title>
    <style>
        /* التنسيقات الكاملة لضمان عمل الواجهة واللوحة */
        body { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; }
        .admin-panel { display: none; background: #f4f4f4; padding: 20px; border: 1px solid #ccc; }
        .card { border: 1px solid #eee; padding: 15px; margin: 10px; border-radius: 8px; }
        .top-controls { position: fixed; bottom: 20px; right: 20px; z-index: 9999; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-controls" onclick="handleSecretClick()">⚙️</div>

    <div id="adminPanel" class="admin-panel">
        <h2>لوحة التحكم الشاملة</h2>
        <div id="adminJobsList"></div>
        <button onclick="addNewJobField()">➕ إضافة وظيفة</button>
        <button onclick="saveAllChanges()" style="background: #27ae60; color: white;">💾 حفظ ونشر التغييرات</button>
    </div>

    <div id="jobsContainer"></div>

    <script>
        // كود الربط والمنطق البرمجي الموحد
        let jobsData = JSON.parse(localStorage.getItem('cfg_dynamic_jobs') || '[]');
        const GOOGLE_SCRIPT_URL = "ضع_رابط_جوجل_شيت_هنا"; // ضع رابطك هنا

        function sendUpdateToGoogleSheets(action, details) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: action, details: details })
            });
        }

        function handleSecretClick() {
            let pass = prompt("الرجاء إدخال الرقم السري:");
            if (pass === "1234") {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function saveAllChanges() {
            localStorage.setItem('cfg_dynamic_jobs', JSON.stringify(jobsData));
            sendUpdateToGoogleSheets("حفظ تغييرات", "تم تحديث الموقع بالكامل");
            alert("✅ تم حفظ التعديلات وتحديث سجل العمليات!");
            location.reload(); // تحديث الصفحة ليظهر التغيير للجميع
        }

        function addNewJobField() {
            jobsData.push({ title: "وظيفة جديدة", desc: "وصف الوظيفة" });
            renderAdminLists();
        }

        function renderAdminLists() {
            const list = document.getElementById('adminJobsList');
            list.innerHTML = jobsData.map((job, index) => `
                <div class="card">
                    <input type="text" value="${job.title}" onchange="jobsData[${index}].title=this.value">
                    <button onclick="jobsData.splice(${index},1); renderAdminLists();">🗑️ حذف</button>
                </div>
            `).join('');
        }
        
        // عند تحميل الصفحة
        window.onload = () => { renderAdminLists(); };
    </script>
</body>
</html>
