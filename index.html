<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة MD للتوظيف | MD Recruitment</title>
    <style>
        :root { --primary: #1a252f; --gold: #b59410; }
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .job-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-right: 5px solid var(--gold); }
        .admin-panel { display: none; background: #fff; padding: 20px; border: 2px solid var(--gold); margin-top: 20px; }
    </style>
</head>
<body>

<h1>بوابة MD للتوظيف</h1>
<div id="jobs-container"></div>
<button onclick="openAdmin()">لوحة التحكم (1425)</button>

<div id="admin-panel" class="admin-panel">
    <h3>إدارة الوظائف</h3>
    <div id="admin-jobs"></div>
    <button onclick="addJobField()">+ إضافة وظيفة جديدة</button>
    <button onclick="saveAll()">حفظ كل شيء</button>
</div>

<script>
    let jobs = JSON.parse(localStorage.getItem('md_jobs')) || [];

    function render() {
        const container = document.getElementById('jobs-container');
        container.innerHTML = jobs.map(j => `
            <div class="job-card">
                <h2>${j.title}</h2>
                <p>${j.desc}</p>
                <a href="${j.link}" target="_blank">رابط التقديم</a>
            </div>
        `).join('');
    }

    function openAdmin() {
        if(prompt("كلمة المرور:") === "1425") {
            document.getElementById('admin-panel').style.display = 'block';
            renderAdmin();
        }
    }

    function renderAdmin() {
        const adminDiv = document.getElementById('admin-jobs');
        adminDiv.innerHTML = jobs.map((j, i) => `
            <div>
                <input value="${j.title}" placeholder="العنوان" id="t${i}">
                <textarea placeholder="الوصف" id="d${i}">${j.desc}</textarea>
                <input value="${j.link}" placeholder="رابط التقديم" id="l${i}">
            </div><hr>
        `).join('');
    }

    function addJobField() {
        jobs.push({title: "وظيفة جديدة", desc: "وصف", link: "#"});
        renderAdmin();
    }

    function saveAll() {
        jobs = jobs.map((j, i) => ({
            title: document.getElementById('t'+i).value,
            desc: document.getElementById('d'+i).value,
            link: document.getElementById('l'+i).value
        }));
        localStorage.setItem('md_jobs', JSON.stringify(jobs));
        location.reload();
    }

    render();
</script>
</body>
</html>
