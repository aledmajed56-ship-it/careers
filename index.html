<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>م د للتوظيف | MD Recruitment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght=600&family=Reenie+Beanie&family=Tajawal:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a252f; --accent-color: #b59410; --text-color: #333; --bg-light: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: var(--text-color); }
        .top-controls { position: fixed; top: 20px; left: 20px; z-index: 10000; display: flex; gap: 10px; }
        .control-btn { background-color: var(--accent-color); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; }
        header { background-size: cover; color: white; text-align: center; padding: 140px 20px; }
        section { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .job-block { margin-bottom: 60px; border-bottom: 2px dashed #eee; padding-bottom: 40px; }
        .btn-job-form { display: inline-block; background: var(--accent-color); color: white; padding: 12px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        .admin-panel { display: none; border: 3px solid var(--accent-color); padding: 25px; margin: 40px auto; }
        .admin-item-card { border: 1px dashed var(--accent-color); padding: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="top-controls">
        <a href="#" class="control-btn" id="mainWebBtn">م د للتوظيف</a>
        <button class="control-btn" onclick="toggleLanguage()">English</button>
    </div>

    <header id="mainHeader">
        <p id="sub-title"></p>
        <h1 id="main-title"></h1>
    </header>

    <section id="jobsSection">
        <div id="jobsContainer"></div>
    </section>

    <div style="text-align:center; padding: 40px;">
        <span onclick="handleSecretClick()" style="cursor:pointer; text-decoration: underline;">المملكة العربية السعودية / KSA</span>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h3>لوحة التحكم</h3>
        <div id="adminJobsList"></div>
        <button onclick="saveAllSettings()" style="width:100%; padding:15px; background:#2ecc71; color:white; border:none;">حفظ ونشر التعديلات</button>
    </div>

    <script>
        const _0x5a1b = ["1425"];
        // ضع رابط الـ Web App الخاص بـ Google Sheet هنا
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-7NoRxtqq59cXIZ4O4xbZKsyzveYKSbLlkBSQfUK5R39q5xYaXk4trJfQ-jWdd6Yn/exec"; 

        let jobsData = JSON.parse(localStorage.getItem('cfg_dynamic_jobs')) || [{
            ar_title: "وظيفة تجريبية", en_title: "Demo Job", form_url: "#", ar_tasks: "مهام تجريبية", en_tasks: "Demo tasks", ar_reqs: "شروط تجريبية", en_reqs: "Demo reqs", ar_btnText: "تقديم", en_btnText: "Apply"
        }];

        function sendUpdateToGoogleSheets(action, details) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, details })
            }).catch(e => console.error(e));
        }

        function renderJobs() {
            let container = document.getElementById('jobsContainer');
            container.innerHTML = jobsData.map((job, index) => `
                <div class="job-block">
                    <h2>${job.ar_title}</h2>
                    <p>${job.ar_tasks}</p>
                    <a href="${job.form_url}" class="btn-job-form" onclick="sendUpdateToGoogleSheets('تقديم', '${job.ar_title}')">التقديم الفوري</a>
                </div>
            `).join('');
        }

        function handleSecretClick() {
            let pass = prompt("الرقم السري:");
            if (pass === _0x5a1b[0]) {
                document.getElementById('adminPanel').style.display = 'block';
                renderAdmin();
            }
        }

        function renderAdmin() {
            let list = document.getElementById('adminJobsList');
            list.innerHTML = jobsData.map((job, index) => `
                <div class="admin-item-card">
                    <input type="text" value="${job.ar_title}" onchange="jobsData[${index}].ar_title = this.value">
                    <input type="text" value="${job.form_url}" onchange="jobsData[${index}].form_url = this.value">
                </div>
            `).join('');
        }

        function saveAllSettings() {
            localStorage.setItem('cfg_dynamic_jobs', JSON.stringify(jobsData));
            sendUpdateToGoogleSheets("حفظ", "تم تحديث الوظائف");
            alert("تم الحفظ!");
            renderJobs();
        }

        window.onload = renderJobs;
    </script>
</body>
</html>
