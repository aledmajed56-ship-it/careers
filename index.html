<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة توظيف اتحاد ميار | MUC Recruitment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght=600&family=Reenie+Beanie&family=Alex+Brush&family=Montserrat:ital,wght@1,300&family=Tajawal:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a252f; --accent-color: #b59410; --text-color: #333; --bg-light: #f8f9fa; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; color: var(--text-color); background-color: #fff; line-height: 1.6; }
        header { background-color: var(--primary-color); color: white; text-align: center; padding: 140px 20px; position: relative; }
        .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(26, 37, 47, 0.85); }
        .header-content { position: relative; z-index: 2; }
        h2 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        .card { background: var(--bg-light); padding: 25px; border-radius: 8px; border-right: 5px solid var(--accent-color); }
        .btn-job-form { display: inline-block; background: var(--accent-color); color: white; padding: 14px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header id="mainHeader">
    <div class="overlay"></div>
    <div class="header-content">
        <p style="color:var(--accent-color); font-weight:bold;" id="sub-title"></p>
        <h1 id="main-title"></h1>
        <div id="hero-desc"></div>
    </div>
</header>

<section style="max-width: 1000px; margin: 40px auto; padding: 20px;">
    <h2 id="about-title"></h2>
    <h3 id="about-subtitle"></h3>
    <div id="about-desc-box">
        <ul id="about-list"></ul>
    </div>
</section>

<script>
    // تم تحديث النصوص الافتراضية هنا لتناسب "أهداف التوظيف في الضيافة"
    let siteData = {
        lang: 'ar',
        ar_heroSub: "استقطاب قيادي",
        ar_heroMain: "فرص قيادية في إدارة المشاريع",
        ar_heroDesc: "تعلن شركة اتحاد ميار عن فتح باب الاستقطاب القيادي لقطاع مشاريع الضيافة الفاخرة",
        
        // التعديل هنا:
        ar_aboutTitle: "أهدافنا للتوظيف في قطاع الضيافة",
        ar_aboutSubtitle: "نستهدف استقطاب وتطوير أفضل الكفاءات الوطنية",
        ar_aboutDesc: "* الارتقاء بمعايير الضيافة الفاخرة من خلال كوادر متميزة.\n* بناء جسور مستدامة بين الشغوفين بالخدمة والفرص القيادية.\n* تعزيز تجربة ضيوفنا عبر خبرات مهنية عالمية الطراز.",
        
        img_header_url: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1200"
    };

    function init() {
        document.getElementById('sub-title').innerText = siteData.ar_heroSub;
        document.getElementById('main-title').innerText = siteData.ar_heroMain;
        document.getElementById('hero-desc').innerText = siteData.ar_heroDesc;
        document.getElementById('about-title').innerText = siteData.ar_aboutTitle;
        document.getElementById('about-subtitle').innerText = siteData.ar_aboutSubtitle;
        
        let listHtml = siteData.ar_aboutDesc.split('\n').map(line => `<li>${line.replace(/^\*\s*/, '')}</li>`).join('');
        document.getElementById('about-list').innerHTML = listHtml;
        document.getElementById('mainHeader').style.backgroundImage = `url('${siteData.img_header_url}')`;
    }
    window.onload = init;
</script>
</body>
</html>
