<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التوظيف المهنية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a252f; --accent-color: #b59410; }
        body { font-family: 'Tajawal', sans-serif; line-height: 1.6; }
        .admin-panel { display: none; background: #fff; border: 2px solid var(--accent-color); padding: 20px; margin: 20px; }
        .job-card { border-bottom: 1px solid #eee; padding: 20px; }
        .btn { background: var(--accent-color); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; }
        .img-fluid { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>

    <header style="text-align:center; padding: 50px;">
        <h1>بوابة الفرص الوظيفية</h1>
    </header>

    <div id="jobsContainer"></div>

    <section class="cta-section" style="text-align:center;">
        <button onclick="handleSecretClick()">إدارة المحتوى</button>
        <div class="admin-panel" id="adminPanel">
            <h3>لوحة التحكم المتقدمة</h3>
            <div id="adminJobsList"></div>
            <button onclick="saveChanges()">حفظ التعديلات</button>
        </div>
    </section>

    <script>
        let jobsData = [
            { id: 0, title: "مسؤول مبيعات", desc: "خبرة في المبيعات وتطوير الأعمال.", link: "#" }
        ];

        function renderJobs() {
            document.getElementById('jobsContainer').innerHTML = jobsData.map(job => `
                <div class="job-card">
                    <h2>${job.title}</h2>
                    <p>${job.desc}</p>
                    <a href="${job.link}" class="btn">تقديم</a>
                </div>
            `).join('');
        }

        function handleSecretClick() {
            let pass = prompt("أدخل كلمة المرور:");
            if (pass === "1425") document.getElementById('adminPanel').style.display = 'block';
        }

        function saveChanges() { alert("تم حفظ البيانات!"); }

        window.onload = renderJobs;
    </script>
</body>
</html>
