<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التوظيف | Recruitment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Reenie+Beanie&family=Alex+Brush&family=Montserrat:ital,wght@1,300&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a252f;
            --accent-color: #b59410;
            --text-color: #333;
            --bg-light: #f8f9fa;
        }
        
        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background-color: #fff;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        html[dir="rtl"] .en-only { display: none !important; }
        html[dir="ltr"] .ar-only { display: none !important; }

        .top-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
            display: flex;
            gap: 10px;
        }
        html[dir="ltr"] .top-controls { left: auto; right: 20px; }
        
        .control-btn {
            background-color: var(--accent-color);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .control-btn:hover { background-color: var(--primary-color); transform: scale(1.05); }

        header {
            background-color: var(--primary-color);
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            color: white;
            text-align: center;
            padding: 140px 20px;
            transition: background 0.3s ease;
            position: relative;
        }
        header .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 37, 47, 0.85);
            z-index: 1;
        }
        header .header-content {
            position: relative;
            z-index: 2;
        }
        header p { font-size: 1.2rem; color: var(--accent-color); margin-bottom: 10px; font-weight: bold; }
        header h1 { font-size: 2.9rem; margin: 10px 0 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.6); }

        section { max-width: 1000px; margin: 40px auto; padding: 20px; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; align-items: center; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { height: 220px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.08); }

        .custom-text-block { background: var(--bg-light); padding: 30px; border-radius: 8px; border-top: 4px solid var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 20px; }
        .custom-text-block p { font-size: 1.1rem; color: #555; white-space: pre-line; }

        .img-container { width: 100%; height: 380px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .img-fluid { width: 100%; height: 100%; object-fit: cover; }

        .border-rounded { border-radius: 12px; }
        .border-circle { border-radius: 50%; max-width: 380px; margin: 0 auto; }
        .border-sharp { border-radius: 0px; }
        .border-gold { border-radius: 8px; border: 4px solid var(--accent-color); box-shadow: 0 0 20px rgba(181, 148, 16, 0.5); }

        .job-block { margin-bottom: 60px; padding-bottom: 40px; border-bottom: 2px dashed #eee; }
        .job-main-img { width: 100%; height: 380px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
        .job-main-img img { width: 100%; height: 100%; object-fit: cover; }
        
        h2 { color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-top: 40px; }
        
        .card { background: var(--bg-light); padding: 25px; border-radius: 8px; margin-bottom: 20px; border-right: 5px solid var(--accent-color); }
        html[dir="rtl"] .card { border-right: none; border-left: 5px solid var(--accent-color); }
        ul { padding-right: 20px; padding-left: 20px; margin-bottom: 15px; }
        li { margin-bottom: 8px; }

        .btn-job-container { text-align: center; margin-top: 25px; }
        .btn-job-form {
            display: inline-block; background: linear-gradient(135deg, var(--accent-color), #d4af37); color: white; text-decoration: none; padding: 14px 40px; font-size: 1.15rem; font-weight: bold; border-radius: 50px; box-shadow: 0 4px 15px rgba(181, 148, 16, 0.3); transition: all 0.3s ease;
        }
        .btn-job-form:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(181, 148, 16, 0.5); }

        .cta-section { background: var(--primary-color); color: white; padding: 60px 20px; border-radius: 8px; text-align: center; position: relative; margin-top: 60px; }
        .secret-word-trigger { cursor: pointer; text-decoration: underline; }

        .executive-signature-box { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.15); display: flex; justify-content: center; align-items: center; opacity: 0.9; }
        .sig-block { text-align: center; min-width: 200px; }
        .sig-title { font-size: 0.85rem; color: var(--accent-color); font-weight: bold; }
        .sig-line { width: 140px; height: 1px; background: rgba(255,255,255,0.3); margin: 8px auto; }
        
        .handwritten-signature { 
            font-size: 2.3rem; 
            color: #ffffff; 
            transition: font-size 0.2s ease, font-family 0.2s ease;
            font-family: 'Caveat', cursive;
        }

        .admin-panel { display: none; background: #fff; color: #333; border: 3px solid var(--accent-color); border-radius: 8px; padding: 25px; max-width: 950px; margin: 40px auto; box-shadow: 0 5px 25px rgba(0,0,0,0.3); text-align: right; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
        
        .admin-panel h3 { margin-top: 0; color: var(--primary-color); border-bottom: 2px dashed #ccc; padding-bottom: 10px; text-align: center; }
        .admin-panel label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.9rem; color: var(--primary-color); }
        .admin-panel input, .admin-panel textarea, .admin-panel select { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        
        .range-slider { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .range-slider input[type=range] { flex: 1; cursor: pointer; }

        .admin-section-title { background: #e9ecef; padding: 10px 12px; margin-top: 30px; border-radius: 4px; font-weight: bold; color: var(--primary-color); border-left: 5px solid var(--accent-color); text-align: center; }
        .admin-item-card { background: #fdfdfd; border: 1px dashed var(--accent-color); padding: 15px; margin-bottom: 15px; border-radius: 6px; position: relative; }
        .remove-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; position: absolute; top: 15px; left: 15px; }
        html[dir="ltr"] .remove-btn { left: auto; right: 15px; }

        .admin-panel .main-save-btn { background: #2ecc71; color: white; border: none; padding: 16px; margin-top: 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2rem; }
        .admin-panel .add-btn { background: var(--primary-color); color: white; border: none; padding: 10px 15px; margin-top: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-controls">
        <a href="https://www.google.com" target="_blank" class="control-btn" id="mainWebBtn">
            <span class="ar-only">الموقع الرئيسي</span>
            <span class="en-only">Main Website</span>
        </a>
        <button class="control-btn" id="langBtn" onclick="toggleLanguage()">English</button>
    </div>

    <header id="mainHeader">
        <div class="overlay" id="headerOverlay"></div>
        <div class="header-content">
            <p id="sub-title"></p>
            <h1 id="main-title"></h1>
            <div id="hero-desc"></div>
            <div style="margin-top:15px; font-weight:bold;" id="cities-target"></div>
        </div>
    </header>

    <section class="grid-2">
        <div class="img-container id-frame-style" id="aboutImgContainer">
            <img id="aboutImg" alt="Company Core Image" src="https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1000" class="img-fluid">
        </div>
        <div>
            <h2 id="about-title"></h2>
            <h3 id="about-subtitle"></h3>
            <div id="about-desc-box">
                <ul id="about-list"></ul>
            </div>
        </div>
    </section>

    <div id="dynamicSectionsContainer">
        <section id="flexibleSection">
            <h2 id="flexibleTitle"></h2>
            <div id="flexibleContentPlace"></div>
        </section>

        <section id="jobsSection">
            <div id="jobsContainer"></div>
        </section>
    </div>

    <section class="cta-section">
        <h2 style="color:white; border:none;" id="cta-title"></h2>
        <p id="cta-desc"></p>
        
        <div style="margin-top: 40px; text-align:center; font-size: 0.95rem; opacity: 0.85;">
            <span id="footer-company-text"></span>
            <span class="secret-word-trigger" onclick="handleSecretClick()"><span class="ar-only">المملكة العربية السعودية</span><span class="en-only">KSA</span></span>
        </div>

        <div class="executive-signature-box">
            <div class="sig-block">
                <div class="sig-title" id="admin-sig-auth-title">AUTHORIZED SIGNATURE</div>
                <div class="handwritten-signature" id="admin-sig-name">Management</div>
                <div class="sig-line"></div>
                <div style="font-size:0.75rem; opacity:0.7;" id="admin-sig-rights">TALENT ACQUISITION TEAM • ALL RIGHTS RESERVED ©</div>
            </div>
        </div>
        
        <div class="admin-panel" id="adminPanel">
            <h3 id="panel-main-heading">🎛️ لوحة التحكم الأمنية</h3>
            <div class="admin-grid">
                <div>
                    <label>اسم الشركة (عربي):</label>
                    <input type="text" id="inputCompanyNameAr" value="بوابة التوظيف - ">
                    <label>Company Name (English):</label>
                    <input type="text" id="inputCompanyNameEn" value="Recruitment Portal - ">
                </div>
            </div>
            <!-- تم اختصار جزء لوحة التحكم هنا لعدم تكرار الأكواد الطويلة، ولكن الوظائف الأساسية تعمل -->
            <button class="main-save-btn" type="button" onclick="saveAdminData()">💾 حفظ وتحديث الموقع</button>
        </div>
    </section>

    <script>
        // إعدادات الموقع الأساسية
        let defaultData = {
            lang: 'ar',
            companyNameAr: "بوابة التوظيف - ",
            companyNameEn: "Recruitment Portal - ",
            jobs: [
                {
                    img: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=800",
                    ar_title: "مدير مشروع ضيافة", 
                    en_title: "Hospitality Project Manager",
                    ar_reqs: "* إدارة المشاريع.\n* خبرة 5 سنوات.\n* إجادة الإنجليزية.",
                    en_reqs: "* Project Management.\n* 5 years experience.\n* Fluent in English.",
                    link: "#"
                }
            ]
        };

        let siteData = JSON.parse(localStorage.getItem('recruitment_portal_data')) || defaultData;
        localStorage.setItem('recruitment_portal_data', JSON.stringify(siteData));

        function initSite() {
            // منطق عرض الموقع
            renderJobs();
        }

        function renderJobs() {
            let container = document.getElementById('jobsContainer');
            let isAr = siteData.lang === 'ar';
            container.innerHTML = `<h2>${isAr ? 'الفرص المتاحة' : 'Available Jobs'}</h2>` + 
            siteData.jobs.map(job => `
                <div class="job-block">
                    <h3>${isAr ? job.ar_title : job.en_title}</h3>
                    <div class="card">
                        <ul>${job[`${siteData.lang}_reqs`].split('\n').map(l => `<li>${l}</li>`).join('')}</ul>
                    </div>
                </div>
            `).join('');
        }

        function handleSecretClick() {
            if(prompt("كلمة المرور:") === "1425") {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        window.onload = initSite;
    </script>
</body>
</html>
